<title>Финансовый пульс — ALTO Finance</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

    --border:#D6CFC4; --green:#16613A; --amber:#B7791F;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  .wrap{width:100%;max-width:640px;margin:0 auto;padding:24px 20px 48px;flex:1;display:flex;flex-direction:column}

  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:12px}
  .logo{font-family:'Playfair Display',serif;font-weight:700;font-size:20px;letter-spacing:-.5px;color:var(--ink);text-decoration:none}
  .logo span{color:var(--red)}
  .top-right{display:flex;align-items:center;gap:14px}
  .lang{display:flex;gap:2px;font-size:12px}
  .lang button{background:none;border:none;font-family:inherit;font-size:12px;color:var(--ink3);cursor:pointer;padding:3px 5px;font-weight:500}
  .lang button.on{color:var(--red)}
  .back-site{font-size:12px;color:var(--ink3);text-decoration:none;white-space:nowrap}
  .back-site:hover{color:var(--red)}

  .progress{height:4px;background:var(--cream3);border-radius:4px;overflow:hidden;margin:18px 0 4px;opacity:0;transition:opacity .3s}
  .progress.show{opacity:1}
  .progress-bar{height:100%;background:var(--red);width:0;transition:width .4s cubic-bezier(.4,0,.2,1)}
  .step-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:500;height:14px}

  .screen{display:none;flex:1;flex-direction:column;justify-content:center;animation:fade .4s ease}
  .screen.active{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .label{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--red);font-weight:500;margin-bottom:16px}
  h1{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,7vw,42px);line-height:1.1;letter-spacing:-1px;margin-bottom:16px}
  h1 em{font-style:italic;color:var(--red)}
  .lead{font-size:16px;font-weight:300;color:var(--ink2);margin-bottom:14px;line-height:1.7}
  .meta-row{display:flex;flex-wrap:wrap;gap:10px;margin:22px 0 28px}
  .chip{font-size:12px;color:var(--ink3);background:var(--white);border:1px solid var(--border);padding:8px 14px;border-radius:40px;display:inline-flex;align-items:center;gap:7px}
  .chip svg{width:14px;height:14px;stroke:var(--red);fill:none;stroke-width:1.6}

  .q-num{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink4);margin-bottom:10px}
  .q-text{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(22px,5.5vw,30px);line-height:1.25;margin-bottom:26px;color:var(--ink)}
  .options{display:flex;flex-direction:column;gap:11px}
  .opt{text-align:left;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:17px 19px;font-family:inherit;font-size:15px;color:var(--ink);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:13px;line-height:1.4}
  .opt:hover{border-color:var(--red);transform:translateY(-1px);box-shadow:0 6px 18px rgba(28,25,23,.06)}
  .opt:active{transform:translateY(0)}
  .opt .dot{flex:0 0 18px;width:18px;height:18px;border:2px solid var(--border);border-radius:50%;transition:all .18s}
  .opt:hover .dot{border-color:var(--red)}
  .opt.sel{border-color:var(--red);background:var(--red-soft)}
  .opt.sel .dot{border-color:var(--red);background:var(--red);box-shadow:inset 0 0 0 3px var(--red-soft)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--ink);color:var(--white);border:none;padding:16px 30px;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;border-radius:10px;cursor:pointer;text-decoration:none;transition:background .2s;width:100%}
  .btn:hover{background:var(--red)}
  .btn.red{background:var(--red)}
  .btn.red:hover{background:var(--red2)}
  .nav{display:flex;gap:12px;margin-top:24px;align-items:center}
  .btn-back{background:none;border:none;color:var(--ink3);font-family:inherit;font-size:14px;cursor:pointer;padding:10px;white-space:nowrap}
  .btn-back:hover{color:var(--ink)}
  .trust{font-size:12px;color:var(--ink3);margin-top:18px;display:flex;align-items:center;gap:7px;justify-content:center;text-align:center}
  .trust svg{width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:1.6;flex:0 0 14px}

  .gauge{text-align:center;margin:8px 0 6px}
  .score-num{font-family:'Playfair Display',serif;font-weight:700;font-size:72px;line-height:1;letter-spacing:-2px}
  .score-100{font-size:24px;color:var(--ink4);font-weight:400}
  .tier{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;margin-top:6px}
  .diag{font-size:15px;font-weight:300;color:var(--ink2);text-align:center;margin:14px auto 26px;max-width:480px;line-height:1.7}
  .bars{display:flex;flex-direction:column;gap:14px;margin-bottom:30px}
  .bar-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
  .bar-head .nm{font-weight:500}
  .bar-head .vl{color:var(--ink3)}
  .bar-track{height:8px;background:var(--cream3);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;width:0;transition:width .9s cubic-bezier(.4,0,.2,1)}
  .recs{background:var(--ink);color:var(--white);border-radius:14px;padding:26px 24px;margin-bottom:24px}
  .recs h3{font-family:'Playfair Display',serif;font-weight:400;font-size:20px;margin-bottom:18px}
  .rec{display:flex;gap:13px;margin-bottom:16px}
  .rec:last-child{margin-bottom:0}
  .rec-n{flex:0 0 26px;width:26px;height:26px;border:1px solid var(--red);color:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
  .rec-t{font-size:14px;font-weight:300;color:rgba(245,240,232,.85);line-height:1.6}
  .rec-t b{color:#fff;font-weight:500}
  .cta-box{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center}
  .cta-box .ct-l{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--red);font-weight:500;margin-bottom:10px}
  .cta-box .ct-h{font-family:'Playfair Display',serif;font-size:21px;line-height:1.3;margin-bottom:8px}
  .cta-box .ct-s{font-size:13px;color:var(--ink3);margin-bottom:18px;font-weight:300}
  .restart{text-align:center;margin-top:20px}
  .restart button{background:none;border:none;color:var(--ink3);font-family:inherit;font-size:13px;cursor:pointer;text-decoration:underline}
  .foot{text-align:center;font-size:11px;color:var(--ink4);margin-top:30px}
</style>
</head>

    <div class="restart"><button id="rRestart" onclick="restart()"></button></div>

</div>

  {ru:"<b>Отделите управленческий учёт от бухгалтерии.</b> Бухгалтерия считает для государства. Вам нужны цифры для решений — это разные вещи.",
   kz:"<b>Басқарушылық есепті бухгалтериядан бөліңіз.</b> Бухгалтерия мемлекет үшін санайды. Сізге шешім қабылдауға арналған сандар керек — бұл бөлек нәрсе.",
   en:"<b>Separate management accounting from bookkeeping.</b> Bookkeeping counts for the state. You need numbers for decisions — those are different things."},
  {ru:"<b>Возьмите дебиторку под контроль.</b> Зависшие у клиентов деньги — это бесплатный кредит, который вы им выдали. Список со сроками возвращает их в кассу.",
   kz:"<b>Дебиторлық қарызды бақылауға алыңыз.</b> Клиенттерде қалып қойған ақша — сіз оларға берген тегін несие. Мерзімімен тізім оларды кассаға қайтарады.",
   en:"<b>Get receivables under control.</b> Money stuck with clients is a free loan you gave them. A list with due dates brings it back to your cash."},
  {ru:"<b>Сделайте финмодель на 3 сценария (MIN/BASE/MAX).</b> Тогда решения о найме и закупках принимаются по цифрам, а не на ощущение.",
   kz:"<b>3 сценарийлі қаржы моделін жасаңыз (MIN/BASE/MAX).</b> Сонда жалдау мен сатып алу туралы шешімдер түйсікпен емес, сандармен қабылданады.",
   en:"<b>Build a 3-scenario financial model (MIN/BASE/MAX).</b> Then hiring and purchasing decisions are made on numbers, not on gut feel."}
];

const tiers = [
  { min:0, max:40,
    name:{ru:"Финансы в тумане",kz:"Қаржы тұманда",en:"Finances in the fog"},
    diag:{ru:"Вы ведёте сильный бизнес почти вслепую: решения на ощупь, реальную прибыль и риски не видно. Хорошая новость — здесь самый быстрый рост: навести порядок = сразу найти деньги, которые уже у вас есть.",
      kz:"Сіз күшті бизнесті дерлік соқыр күйде жүргізіп жатырсыз: шешімдер түйсікпен, нақты пайда мен тәуекелдер көрінбейді. Жақсы жаңалық — мұнда өсу ең жылдам: тәртіп орнату = бұрыннан бар ақшаны бірден табу.",
      en:"You run a strong business almost blind: decisions by feel, real profit and risks invisible. The good news — this is where growth is fastest: order = immediately finding money you already have."}},
  { min:41, max:70,
    name:{ru:"Система есть, но дырявая",kz:"Жүйе бар, бірақ тесік",en:"A system, but a leaky one"},
    diag:{ru:"База заложена, но часть денег утекает в слепых зонах — и именно они тормозят рост. Закрыть 2–3 дыры обычно даёт больше, чем новые продажи.",
      kz:"Негіз қаланған, бірақ ақшаның бір бөлігі көзге көрінбейтін аймақтарда ағып кетеді — дәл солар өсуді тежейді. 2–3 тесікті жабу әдетте жаңа сатылымнан көп береді.",
      en:"The foundation is there, but some money leaks in blind spots — and those are what slow your growth. Closing 2–3 leaks usually beats new sales."}},
  { min:71, max:100,
    name:{ru:"Под контролем",kz:"Бақылауда",en:"Under control"},
    diag:{ru:"Крепкая финансовая база — вы видите свои цифры. Теперь задача не «навести порядок», а расти агрессивнее и не потерять контроль на масштабе.",
      kz:"Берік қаржылық негіз — өз сандарыңызды көресіз. Енді мақсат «тәртіп орнату» емес, агрессивті өсіп, ауқымда бақылауды жоғалтпау.",
      en:"A solid financial base — you see your numbers. Now the task isn't 'getting organized' but growing more aggressively without losing control at scale."}}
];

const waMsg = {
  ru:(s,t,w,sp,tu)=>`Прошёл Финансовый пульс ALTO: ${s}/100 («${t}»). Слабые зоны: ${w}. Сфера: ${sp}, оборот ${tu}. Хочу бесплатный разбор.`,
  kz:(s,t,w,sp,tu)=>`ALTO Қаржылық тексеруден өттім: ${s}/100 («${t}»). Әлсіз аймақтар: ${w}. Сала: ${sp}, айналым ${tu}. Тегін талдау алғым келеді.`,
  en:(s,t,w,sp,tu)=>`Took the ALTO Financial Pulse: ${s}/100 ("${t}"). Weak areas: ${w}. Industry: ${sp}, turnover ${tu}. I'd like a free breakdown.`
};

let answers={}, ctxAns={}, order=[], pos=0, finished=false, lastRes=null;
const $ = id => document.getElementById(id);
order=["c0","c1"]; for(let i=0;i<questions.length;i++) order.push("q"+i);
const totalSteps=order.length;

function setLang(l){
  lang=l;
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  document.documentElement.lang=l;
  renderIntro();
  if($('question').classList.contains('active')) render();
  if($('result').classList.contains('active') && lastRes) renderResult(lastRes);
}

function renderIntro(){
  const t=T[lang];
  $('backSite').textContent=t.backSite;
  $('iLabel').textContent=t.iLabel;
  $('iH1').innerHTML=t.iH1;
  $('iLead').textContent=t.iLead;
  $('iStart').textContent=t.iStart;
  $('iTrust').innerHTML=`<svg viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>${t.iTrust}`;
  const icons=['<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>',
    '<path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6z"/>',
    '<line x1="4" y1="20" x2="4" y2="13"/><line x1="12" y1="20" x2="12" y2="9"/><line x1="20" y1="20" x2="20" y2="5"/>'];
  $('iChips').innerHTML=t.chips.map((c,i)=>`<span class="chip"><svg viewBox="0 0 24 24">${icons[i]}</svg>${c}</span>`).join('');
}

function show(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function start(){pos=0;render();}

function render(){
  const key=order[pos], t=T[lang];
  $('progress').classList.add('show');
  $('progressBar').style.width=((pos)/totalSteps)*100+"%";
  $('stepLabel').textContent=t.step(pos+1,totalSteps);
  $('backBtn').textContent=t.back;
  $('backBtn').style.visibility=pos===0?"hidden":"visible";
  if(key[0]==='c'){
    const c=context[+key.slice(1)];
    $('qNum').textContent=c.num[lang];
    $('qText').textContent=c.text[lang];
    $('options').innerHTML=c.options.map((o,i)=>
      `<button class="opt ${ctxAns[c.id]===i?'sel':''}" onclick="pickCtx('${c.id}',${i})"><span class="dot"></span><span>${o[lang]}</span></button>`).join('');
  }else{
    const qi=+key.slice(1), q=questions[qi];
    $('qNum').textContent=dims[lang][q.dim];
    $('qText').textContent=q.t[lang];
    $('options').innerHTML=q.o.map((o)=>
      `<button class="opt ${answers[qi]===o[1]?'sel':''}" onclick="pickQ(${qi},${o[1]})"><span class="dot"></span><span>${o[0][lang]}</span></button>`).join('');
  }
  show('question');
}

function pickCtx(id,i){ctxAns[id]=i;advance();}
function pickQ(qi,score){answers[qi]=score;advance();}
function advance(){setTimeout(()=>{if(pos<order.length-1){pos++;render();}else finish();},220);}
function prev(){if(pos>0){pos--;render();}}

function finish(){
  const dimScores=dims.ru.map((_,d)=>{
    const qs=questions.map((q,i)=>({q,i})).filter(x=>x.q.dim===d);
    return Math.round(qs.reduce((a,x)=>a+(answers[x.i]??0),0)/qs.length);
  });
  const overall=Math.round(dimScores.reduce((a,b)=>a+b,0)/dimScores.length);
  const tIdx=tiers.findIndex(t=>overall>=t.min&&overall<=t.max);
  const weakest=dims.ru.map((_,d)=>({d,v:dimScores[d]})).sort((a,b)=>a.v-b.v).slice(0,3);
  lastRes={dimScores,overall,tIdx,weakest};
  finished=true;
  renderResult(lastRes);
}

function colorFor(v){return v<40?'var(--red)':(v<71?'var(--amber)':'var(--green)');}

function renderResult(r){
  const t=T[lang], tier=tiers[r.tIdx];
  $('rLabel').textContent=t.rLabel;
  $('tier').textContent="«"+tier.name[lang]+"»";
  $('diag').textContent=tier.diag[lang];
  $('rRecsH').textContent=t.rRecsH;
  $('rCtaL').textContent=t.ctaL; $('rCtaH').textContent=t.ctaH; $('rCtaS').textContent=t.ctaS;
  $('waBtn').textContent=t.wa; $('rRestart').textContent=t.restart; $('backSite').textContent=t.backSite;

  let cur=0;const step=Math.max(1,Math.round(r.overall/30));
  const tick=setInterval(()=>{cur+=step;if(cur>=r.overall){cur=r.overall;clearInterval(tick);}$('scoreNum').textContent=cur;},28);
  $('scoreNum').style.color=colorFor(r.overall);

  $('bars').innerHTML=dims[lang].map((nm,d)=>{
    const v=r.dimScores[d];
    return `<div class="bar-row"><div class="bar-head"><span class="nm">${nm}</span><span class="vl">${v}/100</span></div><div class="bar-track"><div class="bar-fill" style="background:${colorFor(v)}" data-w="${v}"></div></div></div>`;
  }).join('');
  setTimeout(()=>document.querySelectorAll('.bar-fill').forEach(b=>b.style.width=b.dataset.w+"%"),120);

  $('recList').innerHTML=r.weakest.map((w,i)=>
    `<div class="rec"><div class="rec-n">${i+1}</div><div class="rec-t">${recMap[w.d][lang]}</div></div>`).join('');

  const weakNames=r.weakest.map(w=>dims[lang][w.d]).join(", ");
  const sp=ctxAns.sphere!=null?context[0].options[ctxAns.sphere][lang]:"—";
  const tu=ctxAns.turnover!=null?context[1].options[ctxAns.turnover][lang]:"—";
  $('waBtn').href=`https://wa.me/${WA}?text=${encodeURIComponent(waMsg[lang](r.overall,tier.name[lang],weakNames,sp,tu))}`;

  $('progressBar').style.width="100%";
  $('stepLabel').textContent=t.done;
  show('result');
}

function restart(){answers={};ctxAns={};pos=0;finished=false;lastRes=null;$('progress').classList.remove('show');renderIntro();show('intro');window.scrollTo({top:0});}

renderIntro();
</script>
</body>
</html>
